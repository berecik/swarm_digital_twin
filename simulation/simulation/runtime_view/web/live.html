<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Live View - Swarm Digital Twin</title>
    <link rel="stylesheet" href="/web/styles.css">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="telemetry-hud">
        <div>STATUS: <span id="status">CONNECTING...</span></div>
        <div>POS ENU: <span id="pos">0, 0, 0</span></div>
        <div>ALT MSL: <span id="alt">0.0 m</span></div>
        <div>YAW: <span id="yaw">0.0 deg</span></div>
        <div>MODE: <span id="mode">UNKNOWN</span></div>
        <div>BATT: <span id="batt">0%</span></div>
    </div>
    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "/web/vendor/three.module.js",
                "three/addons/": "/web/vendor/"
            }
        }
    </script>
    <script type="module" src="/web/live.js"></script>
</body>
</html>
