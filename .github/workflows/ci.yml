name: CI — Physics Engine & Benchmarks

on:
  push:
    branches: [master, main]
    paths:
      - 'simulation/**'
      - 'gazebo/**'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'simulation/**'
      - 'gazebo/**'
      - 'scripts/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    name: Physics Tests & Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest matplotlib

      - name: Run physics test suite
        working-directory: simulation
        run: |
          python -m pytest test_drone_physics.py -v --tb=short --junitxml=../test-results.xml 2>&1 | tee ../test-output.log

      - name: Run fixed-wing benchmarks
        working-directory: simulation
        run: |
          python drone_scenario.py --benchmark moderate
          python drone_scenario.py --benchmark strong_wind
          python drone_scenario.py --benchmark crosswind
          python drone_scenario.py --benchmark storm

      - name: Run IRS-4 quadrotor benchmarks
        working-directory: simulation
        run: |
          python drone_scenario.py --benchmark irs4_carolina
          python drone_scenario.py --benchmark irs4_epn

      - name: Run swarm benchmarks
        working-directory: simulation
        run: |
          python swarm_scenario.py --benchmark baseline
          python swarm_scenario.py --benchmark crosswind
          python swarm_scenario.py --benchmark gusty

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            test-output.log
          retention-days: 30

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: |
            simulation/*.png
            simulation/*.csv
          retention-days: 30
          if-no-files-found: ignore
