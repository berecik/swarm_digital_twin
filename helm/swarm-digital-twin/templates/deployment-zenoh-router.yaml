{{- if .Values.zenohRouter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "swarm.zenohRouterServiceName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "swarm.labels" . | nindent 4 }}
    app.kubernetes.io/component: zenoh-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: zenoh-router
      {{- include "swarm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: zenoh-router
        {{- include "swarm.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: zenoh-router
          image: {{ include "swarm.zenohRouterImage" . }}
          args: ["--cfg", "mode:'router'"]
          ports:
            - name: zenoh
              containerPort: {{ .Values.zenohRouter.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources.zenohRouter | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: zenoh
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: zenoh
            initialDelaySeconds: 3
            periodSeconds: 5
{{- end }}
