apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "swarm.fullname" . }}-zenoh
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "swarm.labels" . | nindent 4 }}
data:
  {{- /* Pod-0 DNS via headless service — the seed peer for the zenoh mesh */}}
  {{- $fullname := include "swarm.fullname" . }}
  {{- $headless := include "swarm.headlessServiceName" . }}
  {{- $ns := .Values.namespace }}
  {{- $seedDns := printf "%s-0.%s.%s.svc.cluster.local" $fullname $headless $ns }}
  {{- range $i := until (int .Values.drones) }}
  {{- $droneId := add1 $i }}
  drone_{{ $droneId }}.json5: |
    {
      "mode": "peer",
      "listen": {
        "endpoints": ["tcp/[::]:7447"]
      },
      "connect": {
        "endpoints": ["tcp/{{ $seedDns }}:7447"]
      },
      "scouting": {
        "multicast": { "enabled": false }
      },
      "timestamping": {
        "enabled": { "router": true, "peer": true, "client": true }
      }
    }
  bridge_drone_{{ $droneId }}.json5: |
    {
      "mode": "client",
      "connect": {
        "endpoints": ["tcp/localhost:7447"]
      },
      "scouting": {
        "multicast": { "enabled": false }
      },
      "timestamping": {
        "enabled": { "router": true, "peer": true, "client": false }
      },
      "plugins": {
        "ros2dds": {
          "domain": {{ $droneId }},
          "namespace": "/swarm/drone_{{ $droneId }}",
          "allow": {
            "publishers": [
              "/fmu/out/vehicle_status",
              "/fmu/out/vehicle_odometry",
              "/fmu/out/vehicle_global_position",
              "/fmu/out/sensor_combined"
            ],
            "subscribers": [
              "/fmu/in/offboard_control_mode",
              "/fmu/in/trajectory_setpoint",
              "/fmu/in/vehicle_command"
            ],
            "service_servers": [],
            "service_clients": [],
            "action_servers": [],
            "action_clients": []
          }
        }
      }
    }
  {{- end }}
