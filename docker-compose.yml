services:
  sitl_drone_1:
    labels:
      author: beret@hipisi.org.pl
      company: Marysia Software Limited
      website: https://marysia.app
      domain: app.marysia.drone
    image: ardupilot-sitl:latest
    platform: linux/amd64
    container_name: sitl_drone_1
    networks:
      swarm_net:
        ipv4_address: 10.10.1.11
    environment:
    - SIM_LAT=-0.508333
    - SIM_LNG=-78.141667
    - SIM_ALT=4500
    - INSTANCE=0
    profiles:
    - swarm_sitl
    ports:
    - "5760:5760/tcp"
    command:
    - copter
    volumes:
    - sitl_logs:/sitl/logs
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x 'arducopter|arduplane' > /dev/null"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 3
  swarm_node_1:
    image: swarm_companion:latest
    container_name: swarm_node_1
    restart: always
    profiles:
    - swarm_sitl
    networks:
      swarm_net:
        ipv4_address: 10.10.1.21
    environment:
    - ROS_DOMAIN_ID=1
    volumes:
    - ./swarm_control:/root/workspace/swarm_control
    - ./simulation:/root/workspace/simulation
    command: bash -lc "cd /root/workspace/swarm_control && cargo run --bin swarm_node -- 1"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'pgrep -f swarm_node >/dev/null'"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
    - sitl_drone_1
  perception_node_1:
    image: swarm_companion:latest
    container_name: perception_node_1
    networks:
      swarm_net:
        ipv4_address: 10.10.1.31
    environment:
    - ROS_DOMAIN_ID=1
    profiles:
    - swarm_sitl
    volumes:
    - ./perception:/root/workspace/perception
    command: bash -c "export PYTHONPATH=/root/workspace/perception:$$PYTHONPATH &&
      python3 -m perception_core.detector"
    depends_on:
    - sitl_drone_1
    restart: always
    healthcheck:
      test:
      - CMD-SHELL
      - bash -lc 'pgrep -f detector >/dev/null'
      interval: 15s
      timeout: 5s
      retries: 5
