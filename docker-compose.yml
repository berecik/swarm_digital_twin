services:
  sitl_drone_1:
    labels:
      author: "beret@hipisi.org.pl"
      company: "Marysia Software Limited"
      website: "https://marysia.app"
      domain: "app.marysia.drone"
    image: swarm_companion:latest
    container_name: sitl_drone_1
    networks:
      swarm_net:
        ipv4_address: 10.10.1.11
    environment:
      - ROS_DOMAIN_ID=1
    profiles: ["swarm_sitl"]
    command: tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'test -f /dev/null'"]
      interval: 10s
      timeout: 3s
      retries: 3

  swarm_node_1:
    image: swarm_companion:latest
    container_name: swarm_node_1
    restart: always
    profiles: ["swarm_sitl"]
    networks:
      swarm_net:
        ipv4_address: 10.10.1.21
    environment:
      - ROS_DOMAIN_ID=1
    volumes:
      - ./swarm_control:/root/workspace/swarm_control
      - ./simulation:/root/workspace/simulation
    command: bash -c "cd /root/workspace/swarm_control && cargo run"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'pgrep -f cargo >/dev/null'"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      - sitl_drone_1

  perception_node_1:
    image: swarm_companion:latest
    container_name: perception_node_1
    networks:
      swarm_net:
        ipv4_address: 10.10.1.31
    environment:
      - ROS_DOMAIN_ID=1
    profiles: ["swarm_sitl"]
    volumes:
      - ./perception:/root/workspace/perception
    command: bash -c "export PYTHONPATH=\$PYTHONPATH:/root/workspace/perception && ros2 run perception_core detector"
    depends_on:
      - sitl_drone_1

  sitl_drone_2:
    image: swarm_companion:latest
    container_name: sitl_drone_2
    networks:
      swarm_net:
        ipv4_address: 10.10.1.12
    environment:
      - ROS_DOMAIN_ID=2
    profiles: ["swarm_sitl"]
    command: tail -f /dev/null

  swarm_node_2:
    image: swarm_companion:latest
    container_name: swarm_node_2
    networks:
      swarm_net:
        ipv4_address: 10.10.1.22
    environment:
      - ROS_DOMAIN_ID=2
    profiles: ["swarm_sitl"]
    volumes:
      - ./swarm_control:/root/workspace/swarm_control
      - ./simulation:/root/workspace/simulation
    command: bash -c "cd /root/workspace/swarm_control && cargo run -- 2"
    depends_on:
      - sitl_drone_2

  sitl_drone_3:
    image: swarm_companion:latest
    container_name: sitl_drone_3
    networks:
      swarm_net:
        ipv4_address: 10.10.1.13
    environment:
      - ROS_DOMAIN_ID=3
    profiles: ["swarm_sitl"]
    command: tail -f /dev/null

  swarm_node_3:
    image: swarm_companion:latest
    container_name: swarm_node_3
    networks:
      swarm_net:
        ipv4_address: 10.10.1.23
    environment:
      - ROS_DOMAIN_ID=3
    profiles: ["swarm_sitl"]
    volumes:
      - ./swarm_control:/root/workspace/swarm_control
      - ./simulation:/root/workspace/simulation
    command: bash -c "cd /root/workspace/swarm_control && cargo run -- 3"
    depends_on:
      - sitl_drone_3

  # ── Drones 4-6 (completing the 6-drone swarm) ─────────────────────────

  sitl_drone_4:
    image: swarm_companion:latest
    container_name: sitl_drone_4
    networks:
      swarm_net:
        ipv4_address: 10.10.1.14
    environment:
      - ROS_DOMAIN_ID=4
    profiles: ["swarm_sitl"]
    command: tail -f /dev/null

  swarm_node_4:
    image: swarm_companion:latest
    container_name: swarm_node_4
    networks:
      swarm_net:
        ipv4_address: 10.10.1.24
    environment:
      - ROS_DOMAIN_ID=4
    profiles: ["swarm_sitl"]
    volumes:
      - ./swarm_control:/root/workspace/swarm_control
      - ./simulation:/root/workspace/simulation
    command: bash -c "cd /root/workspace/swarm_control && cargo run -- 4"
    depends_on:
      - sitl_drone_4

  sitl_drone_5:
    image: swarm_companion:latest
    container_name: sitl_drone_5
    networks:
      swarm_net:
        ipv4_address: 10.10.1.15
    environment:
      - ROS_DOMAIN_ID=5
    profiles: ["swarm_sitl"]
    command: tail -f /dev/null

  swarm_node_5:
    image: swarm_companion:latest
    container_name: swarm_node_5
    networks:
