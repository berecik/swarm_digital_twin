  sitl_drone_6:
    image: swarm_companion:latest
    container_name: sitl_drone_6
    networks:
      swarm_net:
        ipv4_address: 10.10.1.16
    environment:
      - ROS_DOMAIN_ID=6
    profiles: ["swarm_sitl"]
    command: tail -f /dev/null

  swarm_node_6:
    image: swarm_companion:latest
    container_name: swarm_node_6
    networks:
      swarm_net:
        ipv4_address: 10.10.1.26
    environment:
      - ROS_DOMAIN_ID=6
    profiles: ["swarm_sitl"]
    volumes:
      - ./swarm_control:/root/workspace/swarm_control
      - ./simulation:/root/workspace/simulation
    command: bash -c "cd /root/workspace/swarm_control && cargo run -- 6"
    depends_on:
      - sitl_drone_6

  # ── Zenoh-bridge-ros2dds (one per drone) ─────────────────────────────

  zenoh_bridge_1:
    image: eclipse/zenoh-bridge-ros2dds:latest
    container_name: zenoh_bridge_1
    profiles: ["swarm_sitl"]
    networks:
      swarm_net:
        ipv4_address: 10.10.1.41
    environment:
      - ROS_DOMAIN_ID=1
    volumes:
      - ./docker/zenoh/bridge_drone_1.json5:/etc/zenoh/bridge.json5:ro
    command: ["-c", "/etc/zenoh/bridge.json5"]
    depends_on:
      - sitl_drone_1
    restart: unless-stopped

  zenoh_bridge_2:
    image: eclipse/zenoh-bridge-ros2dds:latest
    container_name: zenoh_bridge_2
    profiles: ["swarm_sitl"]
    networks:
      swarm_net:
        ipv4_address: 10.10.1.42
    environment:
      - ROS_DOMAIN_ID=2
    volumes:
      - ./docker/zenoh/bridge_drone_2.json5:/etc/zenoh/bridge.json5:ro
    command: ["-c", "/etc/zenoh/bridge.json5"]
    depends_on:
      - sitl_drone_2
    restart: unless-stopped

  zenoh_bridge_3:
    image: eclipse/zenoh-bridge-ros2dds:latest
    container_name: zenoh_bridge_3
    profiles: ["swarm_sitl"]
    networks:
      swarm_net:
        ipv4_address: 10.10.1.43
    environment:
      - ROS_DOMAIN_ID=3
    volumes:
      - ./docker/zenoh/bridge_drone_3.json5:/etc/zenoh/bridge.json5:ro
    command: ["-c", "/etc/zenoh/bridge.json5"]
    depends_on:
      - sitl_drone_3
    restart: unless-stopped

  zenoh_bridge_4:
    image: eclipse/zenoh-bridge-ros2dds:latest
    container_name: zenoh_bridge_4
    profiles: ["swarm_sitl"]
    networks:
      swarm_net:
        ipv4_address: 10.10.1.44
    environment:
      - ROS_DOMAIN_ID=4
    volumes:
      - ./docker/zenoh/bridge_drone_4.json5:/etc/zenoh/bridge.json5:ro
    command: ["-c", "/etc/zenoh/bridge.json5"]
    depends_on:
      - sitl_drone_4
    restart: unless-stopped

  zenoh_bridge_5:
    image: eclipse/zenoh-bridge-ros2dds:latest
    container_name: zenoh_bridge_5
    profiles: ["swarm_sitl"]
    networks:
      swarm_net:
        ipv4_address: 10.10.1.45
    environment:
      - ROS_DOMAIN_ID=5
    volumes:
      - ./docker/zenoh/bridge_drone_5.json5:/etc/zenoh/bridge.json5:ro
    command: ["-c", "/etc/zenoh/bridge.json5"]
    depends_on:
      - sitl_drone_5
    restart: unless-stopped

  zenoh_bridge_6:
    image: eclipse/zenoh-bridge-ros2dds:latest
    container_name: zenoh_bridge_6
    profiles: ["swarm_sitl"]
    networks:
      swarm_net:
        ipv4_address: 10.10.1.46
    environment:
      - ROS_DOMAIN_ID=6
    volumes:
      - ./docker/zenoh/bridge_drone_6.json5:/etc/zenoh/bridge.json5:ro
    command: ["-c", "/etc/zenoh/bridge.json5"]
    depends_on:
      - sitl_drone_6
    restart: unless-stopped

  # ── ArduPilot SITL ───────────────────────────────────────────────────
  ardupilot_sitl:
    build:
      context: .
      dockerfile: Dockerfile.sitl
      platforms:
        - linux/amd64
    image: ardupilot-sitl:latest
    platform: linux/amd64
    container_name: ardupilot_sitl
    profiles: ["sitl"]
    networks:
      swarm_net:
        ipv4_address: 10.10.1.50
    environment:
      - SIM_LAT=-0.508333
      - SIM_LNG=-78.141667
      - SIM_ALT=4500
      - INSTANCE=0
    ports:
      - "9002:9002/udp"
      - "9003:9003/udp"
      - "14550:14550/udp"
      - "14555:14555/udp"
      - "5760:5760/tcp"
    volumes:
      - ./gazebo/models:/sitl/models:ro
      - ./missions:/sitl/missions:ro
      - sitl_logs:/sitl/logs
    command: ["copter"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x 'arducopter|arduplane' > /dev/null"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 3

  ardupilot_sitl_plane:
    build:
      context: .
      dockerfile: Dockerfile.sitl
      platforms:
        - linux/amd64
    image: ardupilot-sitl:latest
    platform: linux/amd64
    container_name: ardupilot_sitl_plane
    profiles: ["sitl_plane"]
    networks:
      swarm_net:
        ipv4_address: 10.10.1.51
    environment:
      - SIM_LAT=-0.508333
      - SIM_LNG=-78.141667
      - SIM_ALT=4500
      - INSTANCE=1
    ports:
      - "9012:9002/udp"
      - "9013:9003/udp"
      - "14560:14550/udp"
    volumes:
      - ./gazebo/models:/sitl/models:ro
      - ./missions:/sitl/missions:ro
      - sitl_logs:/sitl/logs
    command: ["plane"]

volumes:
  sitl_logs:

networks:
  swarm_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.1.0/24
